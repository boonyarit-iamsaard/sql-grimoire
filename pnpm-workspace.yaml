packages:
  - "apps/*"

nodeVersion: 24.15.0
engineStrict: true
strictPeerDependencies: true
verifyDepsBeforeRun: error

overrides:
  "miniflare>sharp": 0.35.0

minimumReleaseAge: 1440
minimumReleaseAgeIgnoreMissingTime: false
minimumReleaseAgeStrict: true
trustPolicy: no-downgrade
trustPolicyExclude:
  # Babel still depends on this established release, which predates consistent trust evidence.
  - "semver@6.3.1"
blockExoticSubdeps: true

strictDepBuilds: true

allowBuilds:
  esbuild: false
  sharp: false
  workerd: false
