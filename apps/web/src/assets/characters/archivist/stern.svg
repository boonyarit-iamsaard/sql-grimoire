<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Archivist Hesper, stern">
  <rect width="200" height="200" rx="14" fill="#26303c"/>
  <rect x="6" y="6" width="188" height="188" rx="10" fill="#31404f"/>
  <!-- shoulders / robe -->
  <path d="M 30 200 C 35 150 70 138 100 138 C 130 138 165 150 170 200 Z" fill="#3e5a74"/>
  <path d="M 100 138 L 100 200" stroke="#2c435a" stroke-width="4"/>
  <!-- scroll clasp -->
  <rect x="90" y="148" width="20" height="10" rx="3" fill="#e3b23c"/>
  <!-- neck & face -->
  <rect x="88" y="112" width="24" height="26" fill="#cfa176"/>
  <ellipse cx="100" cy="88" rx="34" ry="38" fill="#ddb088"/>
  <!-- hood -->
  <path d="M 60 92 C 52 38 86 28 100 28 C 114 28 148 38 140 92 C 142 60 122 46 100 46 C 78 46 58 60 60 92 Z" fill="#4a6b8a"/>
  <path d="M 60 92 C 60 72 76 52 100 52 C 124 52 140 72 140 92 C 140 78 122 60 100 60 C 78 60 60 78 60 92 Z" fill="#9db4c8" opacity="0.55"/>
  <!-- grey hair wisps -->
  <path d="M 70 66 Q 78 58 88 60" fill="none" stroke="#d8d3c8" stroke-width="3" stroke-linecap="round"/>
  <path d="M 112 60 Q 122 58 130 66" fill="none" stroke="#d8d3c8" stroke-width="3" stroke-linecap="round"/>
  <!-- spectacles -->
  <g fill="none" stroke="#e3b23c" stroke-width="3">
    <circle cx="86" cy="88" r="10"/>
    <circle cx="114" cy="88" r="10"/>
    <path d="M 96 88 L 104 88"/>
  </g>
  <!-- eyes: narrowed -->
  <g fill="#2c2418">
    <ellipse cx="86" cy="89" rx="4.5" ry="3.2"/>
    <ellipse cx="114" cy="89" rx="4.5" ry="3.2"/>
  </g>
  <!-- brows: flat and lowered -->
  <path d="M 77 77 L 95 79" fill="none" stroke="#8a97a5" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 105 79 L 123 77" fill="none" stroke="#8a97a5" stroke-width="3.5" stroke-linecap="round"/>
  <!-- nose & mouth: pressed thin -->
  <path d="M 100 94 Q 97 101 100 104" fill="none" stroke="#b98a5e" stroke-width="3" stroke-linecap="round"/>
  <path d="M 90 114 L 110 114" fill="none" stroke="#7a5a44" stroke-width="3.5" stroke-linecap="round"/>
</svg>
