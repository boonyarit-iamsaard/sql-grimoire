<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Merchant Guild hall">
  <!-- guild hall -->
  <rect x="24" y="52" width="72" height="48" fill="#c96f4a" stroke="#6b4f26" stroke-width="4"/>
  <path d="M 16 56 L 60 22 L 104 56 Z" fill="#8c3b2e" stroke="#6b4f26" stroke-width="4" stroke-linejoin="round"/>
  <!-- door -->
  <rect x="50" y="70" width="20" height="30" rx="9" fill="#5d4730" stroke="#6b4f26" stroke-width="3"/>
  <!-- windows -->
  <rect x="32" y="62" width="12" height="12" fill="#f4d58d" stroke="#6b4f26" stroke-width="3"/>
  <rect x="76" y="62" width="12" height="12" fill="#f4d58d" stroke="#6b4f26" stroke-width="3"/>
  <!-- hanging sign: coin -->
  <line x1="96" y1="56" x2="96" y2="68" stroke="#6b4f26" stroke-width="3"/>
  <circle cx="96" cy="76" r="9" fill="#e3b23c" stroke="#6b4f26" stroke-width="3"/>
  <!-- chimney smoke -->
  <rect x="78" y="28" width="10" height="16" fill="#8c3b2e" stroke="#6b4f26" stroke-width="3"/>
  <circle cx="86" cy="20" r="4" fill="#d8d3c8" opacity="0.8"/>
  <circle cx="92" cy="13" r="5" fill="#d8d3c8" opacity="0.6"/>
</svg>
