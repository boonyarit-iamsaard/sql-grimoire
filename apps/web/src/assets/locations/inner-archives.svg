<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Inner Archives tower">
  <!-- tower -->
  <rect x="34" y="40" width="52" height="60" fill="#7d8a99" stroke="#3f4a56" stroke-width="4"/>
  <path d="M 26 44 L 60 14 L 94 44 Z" fill="#4a6b8a" stroke="#3f4a56" stroke-width="4" stroke-linejoin="round"/>
  <!-- tall shelf windows -->
  <g fill="#f4d58d" stroke="#3f4a56" stroke-width="3">
    <rect x="42" y="50" width="10" height="20"/>
    <rect x="68" y="50" width="10" height="20"/>
  </g>
  <g stroke="#3f4a56" stroke-width="2">
    <line x1="42" y1="57" x2="52" y2="57"/>
    <line x1="42" y1="64" x2="52" y2="64"/>
    <line x1="68" y1="57" x2="78" y2="57"/>
    <line x1="68" y1="64" x2="78" y2="64"/>
  </g>
  <!-- arched door -->
  <path d="M 52 100 L 52 84 A 8 8 0 0 1 68 84 L 68 100 Z" fill="#31404f" stroke="#3f4a56" stroke-width="3"/>
  <!-- hanging sign: scroll -->
  <line x1="88" y1="48" x2="88" y2="60" stroke="#3f4a56" stroke-width="3"/>
  <rect x="80" y="60" width="16" height="12" rx="3" fill="#e8dcc0" stroke="#3f4a56" stroke-width="3"/>
  <line x1="84" y1="66" x2="92" y2="66" stroke="#8a6d3b" stroke-width="2"/>
  <!-- lantern glow at the peak -->
  <circle cx="60" cy="30" r="5" fill="#f4d58d" stroke="#3f4a56" stroke-width="3"/>
</svg>
